            el.textContent = text;
            el.className = 'message ' + type;
            setTimeout(()=>{ el.className = 'message'; }, 4000);
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
        }

        function disconnect() {
            localStorage.removeItem('msi_user');
            window.location.href = 'index.html';
        }

        function getGameIcon(gameId) {
            const icons = {fifa:'⚽',cod:'🎯',fortnite:'🏗️',csgo2:'💣',lol:'⚔️',motogp:'🏍️'};
            return icons[gameId] || '🎮';
        }

        function getScoreLabel(gameId) {
            return {fifa:'Tore',cod:'Kills',fortnite:'Kills',csgo2:'Rounds'}[gameId?.toLowerCase()] || 'Punkte';
        }

        function getTournamentViewLink(tournament) {
            return 'tournament.html';
        }

        async function initPage() {
            const session = getSession();
            if (!session) {
                document.getElementById('tournamentsGrid').innerHTML = `
                    <div class="no-tournaments">
                        <h3>Nicht eingeloggt</h3>
                        <p>Bitte <a href="profile.html" style="color:#00ff88;">einloggen</a>, um deine Turniere zu sehen.</p>
                    </div>`;
                return;
            }
            currentUser = session;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('walletAddress').textContent = `👤 ${session.platformUsername}`;
            await loadMyTournaments();
            refreshInterval = setInterval(loadMyTournaments, 15000);
        }

        async function loadMyTournaments() {
            try {
                const res = await fetch(`${API}/games`);
                const games = await res.json();
                myTournaments = [];
                for (const [gameId, game] of Object.entries(games)) {
                    for (const tournament of Object.values(game.tournaments || {})) {
                        const isParticipant = tournament.participants?.some(p => p.email === currentUser.email);
                        if (isParticipant) {
                            myTournaments.push({ ...tournament, gameId, gameName: game.name });
                        }
                    }
                }
                displayMyTournaments();
            } catch (e) {
                showMessage('Fehler beim Laden der Turniere.', 'error');
            }
        }

        function displayMyTournaments() {
            const grid = document.getElementById('tournamentsGrid');
            if (!myTournaments.length) {
                grid.innerHTML = `
                    <div class="no-tournaments">
                        <h3>Keine aktiven Turniere</h3>
                        <p>Du bist noch in keinem Turnier angemeldet. <a href="registration.html" style="color:#00ff88;">Jetzt anmelden →</a></p>
                    </div>`;
                return;
            }

            grid.innerHTML = myTournaments.map(tournament => {
                const myParticipant = tournament.participants?.find(p => p.email === currentUser.email);
                const statusLabel = {registration:'Registrierung',started:'Läuft',finished:'Beendet'}[tournament.status] || tournament.status;
                const statusColor = {registration:'rgba(0,255,136,0.2)',started:'rgba(255,215,0,0.2)',finished:'rgba(255,71,87,0.2)'}[tournament.status] || 'transparent';

                // Find my current match
                let myMatchHtml = '';
                if (tournament.status === 'started' && tournament.bracket) {
                    for (const round of tournament.bracket.rounds) {
                        const myMatch = round.find(m =>
                            m.status === 'pending' &&
                            (m.player1?.email === currentUser.email || m.player2?.email === currentUser.email)
                        );
                        if (myMatch) {
                            const isPlayer1 = myMatch.player1?.email === currentUser.email;
                            const opponent = isPlayer1 ? myMatch.player2 : myMatch.player1;
                            const hasPending = myMatch.pendingResults?.some(r => r.email === currentUser.email);
                            const scoreLabel = getScoreLabel(tournament.gameId);
                            myMatchHtml = `
                                <div class="my-match-section visible" style="background:rgba(255,215,0,0.08);border:1px solid #ffd700;border-radius:15px;padding:1.5rem;margin-top:1rem;">
                                    <div style="color:#ffd700;font-weight:bold;font-size:1.1rem;margin-bottom:1rem;">⚔️ Dein aktuelles Match</div>
                                    <div style="display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;">
                                        <div style="text-align:center;">
                                            <div style="color:#00ff88;font-weight:bold;">${myParticipant?.platformUsername || 'Du'}</div>
                                            <div style="font-size:0.8rem;color:#aaa;">Du</div>
                                        </div>
                                        <div style="color:#ffd700;font-size:1.5rem;font-weight:bold;">VS</div>
                                        <div style="text-align:center;">
                                            <div style="color:#fff;font-weight:bold;">${opponent?.platformUsername || 'Gegner'}</div>
                                            <div style="font-size:0.8rem;color:#aaa;">Gegner</div>
                                        </div>
                                    </div>
                                    ${hasPending ? '<div style="color:#00ff88;text-align:center;margin-bottom:0.5rem;">✅ Ergebnis eingereicht – warte auf Gegner</div>' : `
                                    <div style="display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:0.5rem;">
                                        <input type="number" id="score1_${myMatch.id}" min="0" placeholder="Deine ${scoreLabel}" style="width:120px;padding:8px;border-radius:10px;background:#2a2a3e;border:1px solid #333;color:#fff;text-align:center;">
                                        <span style="color:#aaa;">:</span>
                                        <input type="number" id="score2_${myMatch.id}" min="0" placeholder="${scoreLabel} Gegner" style="width:120px;padding:8px;border-radius:10px;background:#2a2a3e;border:1px solid #333;color:#fff;text-align:center;">
                                        <button onclick="submitResult('${tournament.gameId}','${tournament.id}','${myMatch.id}','${myParticipant?.id}')" style="background:linear-gradient(45deg,#00ff88,#00ccff);color:#000;border:none;padding:10px 20px;border-radius:15px;font-weight:bold;cursor:pointer;">Einreichen</button>
                                    </div>`}
                                </div>`;
                            break;
                        }
                    }
                }

                return `
                <div class="tournament-card" style="background:${statusColor};animation:fadeIn 0.4s ease-out;">
                    <div class="tournament-header">
                        <div style="font-size:1.5rem;">${getGameIcon(tournament.gameId)}</div>
                        <div style="flex:1;margin-left:12px;">
                            <div style="font-weight:bold;font-size:1.1rem;color:#fff;">${tournament.name}</div>
                            <div style="color:#aaa;font-size:0.85rem;">${tournament.gameName}${tournament.contestFormat?' · '+tournament.contestFormat:''}</div>
                        </div>
                        <span style="background:${statusColor};border:1px solid;padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:bold;">${statusLabel}</span>
                    </div>
                    <div style="margin-top:0.5rem;font-size:0.85rem;color:#aaa;">
                        👥 ${tournament.participants?.length||0} Spieler · 📅 ${formatDate(tournament.createdAt)}
                        ${tournament.winner ? ` · 🏆 Gewinner: <strong style="color:#ffd700;">${tournament.winner.platformUsername}</strong>` : ''}
                    </div>
                    ${myMatchHtml}
                    <div style="margin-top:1rem;">
                        <a href="${getTournamentViewLink(tournament)}" onclick="localStorage.setItem('selectedGame','${tournament.gameName}')" style="display:inline-block;background:linear-gradient(45deg,#00ff88,#00ccff);color:#000;padding:10px 20px;border-radius:15px;text-decoration:none;font-weight:bold;font-size:0.9rem;">📊 Bracket ansehen</a>
                    </div>
                </div>`;
            }).join('');
        }

        async function submitResult(gameId, tournamentId, matchId, participantId) {
            const s1 = parseInt(document.getElementById(`score1_${matchId}`)?.value);
            const s2 = parseInt(document.getElementById(`score2_${matchId}`)?.value);
            if (isNaN(s1) || isNaN(s2)) return showMessage('Bitte beide Ergebnisse eingeben.', 'error');
            if (s1 === s2) return showMessage('Unentschieden ist nicht erlaubt.', 'error');
            try {
                const res = await fetch(`${API}/games/${gameId}/tournaments/${tournamentId}/matches/${matchId}/submit-result`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ submittedBy: participantId, email: currentUser.email, score1: s1, score2: s2 })
                });
                const data = await res.json();
                if (!res.ok) return showMessage(data.error || 'Fehler.', 'error');
                showMessage(data.message || '✅ Ergebnis eingereicht.', 'success');
                await loadMyTournaments();
            } catch { showMessage('Server nicht erreichbar.', 'error'); }
        }

        function toggleMobileMenu() {
            const navMenu = document.getElementById('navMenu');
            const toggle = document.getElementById('mobileToggle');
            if (navMenu && toggle) {
                navMenu.classList.toggle('mobile-open');
                toggle.textContent = navMenu.classList.contains('mobile-open') ? '✕' : '☰';
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);
        window.addEventListener('beforeunload', ()=>{ if(refreshInterval) clearInterval(refreshInterval); });
    </script>
</body>
</html>
