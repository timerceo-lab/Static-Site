<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Tournament - MSI Gaming Universe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #00ff88, transparent),
                radial-gradient(1px 1px at 90px 40px, #00ccff, transparent);
            background-repeat: repeat;
            background-size: 400px 400px;
            animation: float 15s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-20px) translateX(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 136, 0.6); }
        }

        .msi-navigation {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #333;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .msi-logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .msi-logo {
            width: 120px;
            height: auto;
            border-radius: 0;
            background: none;
            box-shadow: none;
            animation: none;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-link {
            color: #cccccc;
            text-decoration: none;
            font-weight: 500;
            padding: 0.7rem 1.2rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link:hover {
            color: #00ff88;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        .nav-link.active {
            background: linear-gradient(145deg, rgba(0, 255, 136, 0.2), rgba(0, 204, 255, 0.1));
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 1rem;
        }

        .user-info.visible {
            display: flex;
            animation: fadeIn 0.6s ease-out;
        }

        .wallet-address {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            padding: 10px 20px;
            border-radius: 25px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            border: 1px solid #333;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .connect-button {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: #0a0a0a;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .chess-square.check {
            background: rgba(255, 71, 87, 0.7) !important;
            box-shadow: inset 0 0 20px rgba(255, 71, 87, 0.8);
        }

        .connect-button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.5);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(45deg, #ffffff, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chess-game {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 2px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .player-info {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #333;
            transition: all 0.3s ease;
        }

        .player-info.active {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            animation: pulse 2s infinite;
        }

        .player-info.current-user {
            background: linear-gradient(145deg, rgba(0, 255, 136, 0.2), rgba(0, 204, 255, 0.1));
            border-color: #00ff88;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 0.5rem;
        }

        .player-color {
            font-size: 0.9rem;
            color: #cccccc;
        }

        .vs-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
        }

        .chess-board-container {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 3px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .chess-square {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .chess-square.white {
            background: #f0d9b5;
        }

        .chess-square.black {
            background: #b58863;
        }

        .chess-square.selected {
            background: rgba(0, 255, 136, 0.7) !important;
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.8);
        }

        .chess-square:hover {
            filter: brightness(1.1);
        }

        .chess-square img {
    width: 50px;
    height: 50px;
    pointer-events: none;
    user-select: none;
}

        .game-status {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }

        .game-status.waiting {
            color: #ffd700;
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.1), rgba(255, 237, 78, 0.05));
            border: 1px solid #ffd700;
        }

        .game-status.my-turn {
            color: #00ff88;
            background: linear-gradient(145deg, rgba(0, 255, 136, 0.1), rgba(0, 204, 255, 0.05));
            border: 1px solid #00ff88;
            animation: pulse 2s infinite;
        }

        .game-status.finished {
            color: #ff6b7a;
            background: linear-gradient(145deg, rgba(255, 71, 87, 0.2), rgba(255, 107, 122, 0.1));
            border: 1px solid #ff4757;
        }

        .game-status.winner {
            color: #00ff88;
            background: linear-gradient(145deg, rgba(0, 255, 136, 0.2), rgba(0, 204, 255, 0.1));
            border: 1px solid #00ff88;
        }

        .move-history {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 1rem;
            border: 1px solid #333;
            max-height: 300px;
            overflow-y: auto;
        }

        .move-history h3 {
            color: #00ff88;
            margin-bottom: 1rem;
            text-align: center;
        }

        .moves-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
        }

        .move-item {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            padding: 0.5rem;
            border-radius: 8px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            border: 1px solid #333;
        }

        .message {
            padding: 1rem 1.5rem;
            border-radius: 15px;
            margin: 1rem 0;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .message.visible {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .message.error {
            background: linear-gradient(145deg, rgba(255, 71, 87, 0.2), rgba(255, 107, 122, 0.1));
            color: #ff6b7a;
            border: 2px solid #ff4757;
        }

        .message.success {
            background: linear-gradient(145deg, rgba(0, 255, 136, 0.2), rgba(0, 204, 255, 0.1));
            color: #00ff88;
            border: 2px solid #00ff88;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .chess-board {
                grid-template-columns: repeat(8, 45px);
                grid-template-rows: repeat(8, 45px);
            }

            .chess-square {
                width: 45px;
                height: 45px;
                font-size: 2rem;
            }

            .game-info {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .vs-text {
                order: -1;
            }

            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="msi-navigation">
        <div class="msi-logo-container">
            <img src="MSI.png" alt="MSI Logo" class="msi-logo">
        </div>
        
        <div class="nav-menu">
            <a href="index.html" class="nav-link">
                <span>🏠</span>
                Home
            </a>
            <a href="registration.html" class="nav-link">
                <span>📝</span>
                Registrieren
            </a>
            <a href="my_tournaments.html" class="nav-link">
                <span>🏆</span>
                Meine Turniere
            </a>
            <a href="profile.html" class="nav-link">
                <span>👤</span>
                Profil
            </a>
            <a href="chat_test_page.html" class="nav-link">
        <span>💬</span>
        Chat
    </a>
        </div>

        <button class="connect-button" id="connectButton" onclick="connectWallet()">
            <span>🦊</span>
            Mit MetaMask verbinden
        </button>
        
        <div class="user-info" id="userInfo">
            <div class="wallet-address" id="walletAddress"></div>
            <button class="connect-button" onclick="disconnect()" style="padding: 10px 20px; font-size: 0.9rem;">
                🚪 Trennen
            </button>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="page-title">♟️ Chess Tournament</h1>

        <!-- Message Container -->
        <div class="message" id="messageContainer"></div>

        <!-- Chess Game Container -->
        <div class="chess-game" id="chessGame" style="display: none;">
            <div class="game-info">
                <div class="player-info" id="whitePlayer">
                    <div class="player-name">Spieler 1</div>
                    <div class="player-color">Weiß</div>
                </div>
                <div class="vs-text">VS</div>
                <div class="player-info" id="blackPlayer">
                    <div class="player-name">Spieler 2</div>
                    <div class="player-color">Schwarz</div>
                </div>
            </div>

            <div class="game-status" id="gameStatus">Lade Spiel...</div>

            <div class="chess-board-container">
                <div class="chess-board" id="chessBoard">
                    <!-- Board wird dynamisch generiert -->
                </div>
            </div>            
        </div>

        <!-- Loading/No Game State -->
        <div class="loading" id="loadingState">
            <div class="loading-spinner"></div>
            <p>Suche nach deinem aktuellen CS:GO2 Spiel...</p>
        </div>
    </div>

    <script>
        let currentUser = null;
        let gameState = null;
        let selectedSquare = null;
        let validMoves = [];
        let pollingInterval = null;

        // Chess pieces mapping
        const chessPieces = {
    'white': {
        'king': 'assets/weiss-koenig.png',
        'queen': 'assets/weiss-dame.png',
        'rook': 'assets/weiss-turm.png',
        'bishop': 'assets/weiss-laeufer.png',
        'knight': 'assets/weiss-springer.png',
        'pawn': 'assets/weiss-bauer.png'
    },
    'black': {
        'king': 'assets/schwarz-koenig.png',
        'queen': 'assets/schwarz-dame.png',
        'rook': 'assets/schwarz-turm.png',
        'bishop': 'assets/schwarz-laeufer.png',
        'knight': 'assets/schwarz-springer.png',
        'pawn': 'assets/schwarz-bauer.png'
    }
};

// Fallback Unicode symbols
const chessPiecesFallback = {
    'white': {
        'king': '♔', 'queen': '♕', 'rook': '♖',
        'bishop': '♗', 'knight': '♘', 'pawn': '♙'
    },
    'black': {
        'king': '♚', 'queen': '♛', 'rook': '♜',
        'bishop': '♝', 'knight': '♞', 'pawn': '♟'
    }
};

        // Initial board setup
        const initialBoard = [
            ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'],
            ['pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn'],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            ['pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn'],
            ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook']
        ];

        // MetaMask check
        function isMetaMaskInstalled() {
            return typeof window.ethereum !== 'undefined' && window.ethereum.isMetaMask;
        }

        // Format wallet address
        function formatAddress(address) {
            return `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
        }

        // Show message
        function showMessage(text, type = 'info') {
            const messageContainer = document.getElementById('messageContainer');
            messageContainer.textContent = text;
            messageContainer.className = `message visible ${type}`;
            
            setTimeout(() => {
                messageContainer.classList.remove('visible');
            }, 5000);
        }

        // Connect wallet
        async function connectWallet() {
            if (!isMetaMaskInstalled()) {
                showMessage('MetaMask ist nicht installiert.', 'error');
                return;
            }

            try {
                const connectBtn = document.getElementById('connectButton');
                connectBtn.textContent = 'Verbinde...';
                connectBtn.disabled = true;

                const accounts = await window.ethereum.request({
                    method: 'eth_requestAccounts'
                });

                if (accounts.length > 0) {
                    const walletAddress = accounts[0];
                    const response = await fetch(`https://msi-tournament-backend.onrender.com/user/${walletAddress}`);
                    
                    if (response.ok) {
                        currentUser = await response.json();
                        updateConnectedUI();
                        await loadChessGame();
                        showMessage(`Willkommen zurück, ${currentUser.platformUsername || currentUser.username}!`, 'success');
                    } else {
                        showMessage('Diese Wallet ist nicht registriert.', 'error');
                    }
                }
            } catch (error) {
                console.error('Connection error:', error);
                showMessage('Fehler beim Verbinden mit MetaMask.', 'error');
            } finally {
                const connectBtn = document.getElementById('connectButton');
                connectBtn.innerHTML = '<span>🦊</span>Mit MetaMask verbinden';
                connectBtn.disabled = false;
            }
        }

        // Update UI after connection
        function updateConnectedUI() {
            document.getElementById('connectButton').style.display = 'none';
            document.getElementById('userInfo').classList.add('visible');
            document.getElementById('walletAddress').textContent = formatAddress(currentUser.walletAddress);
        }

        // Disconnect
        function disconnect() {
            currentUser = null;
            gameState = null;
            
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
            
            document.getElementById('connectButton').style.display = 'block';
            document.getElementById('userInfo').classList.remove('visible');
            document.getElementById('chessGame').style.display = 'none';
            document.getElementById('loadingState').style.display = 'block';
        }

        // Load chess game
        async function loadChessGame() {
    if (!currentUser) return;

    try {
        // Check if matchId is in URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        
        if (matchId) {
            // Load specific match
            await loadMatchById(matchId);
        } else {
            // Find active chess tournament (alte Logik)
            const response = await fetch('https://msi-tournament-backend.onrender.com/games/chess/tournaments/active');
            
            if (response.ok) {
                const tournament = await response.json();
                const myMatch = findMyCurrentMatch(tournament);
                
                if (myMatch) {
                    await loadMatchState(myMatch.id);
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('chessGame').style.display = 'block';
                    startPolling(myMatch.id);
                } else {
                    showNoActiveGame();
                }
            } else {
                throw new Error('Kein aktives CS:GO2 Turnier gefunden');
            }
        }
        
    } catch (error) {
        console.error('Error loading chess game:', error);
        showMessage('Fehler beim Laden des CS:GO2 Spiels.', 'error');
        showErrorState();
    }
}

// Neue Funktion zum Laden eines spezifischen Matches
async function loadMatchById(matchId) {
    try {
        const response = await fetch(`https://msi-tournament-backend.onrender.com/games/chess/matches/${matchId}/state`);
        
        if (response.ok) {
            currentMatchId = matchId;
            const data = await response.json();
            updateGameDisplay(data);
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('chessGame').style.display = 'block';
            startPolling(matchId);
        } else {
            throw new Error('Match nicht gefunden');
        }
    } catch (error) {
        console.error('Error loading match:', error);
        throw error;
    }
}

function showNoActiveGame() {
    document.getElementById('loadingState').innerHTML = `
        <div style="text-align: center; padding: 3rem;">
            <h3 style="color: #00ff88; margin-bottom: 1rem;">Kein aktives CS:GO2 Spiel</h3>
            <p>Du hast derzeit kein laufendes CS:GO2 Spiel.</p>
            <div style="margin-top: 2rem;">
                <a href="my_tournaments.html" class="connect-button" style="text-decoration: none;">
                    Zu meinen Turnieren
                </a>
            </div>
        </div>
    `;
}

function showErrorState() {
    document.getElementById('loadingState').innerHTML = `
        <div style="text-align: center; padding: 3rem; color: rgba(255, 255, 255, 0.6);">
            <h3 style="color: #ff6b7a; margin-bottom: 1rem;">Fehler beim Laden</h3>
            <p>Das CS:GO2 Spiel konnte nicht geladen werden.</p>
            <div style="margin-top: 2rem;">
                <button onclick="loadChessGame()" class="connect-button">
                    Erneut versuchen
                </button>
            </div>
        </div>
    `;
}

        // Find my current match in tournament
        function findMyCurrentMatch(tournament) {
            if (!tournament.bracket || !tournament.bracket.rounds) return null;

            for (const round of tournament.bracket.rounds) {
                for (const match of round) {
                    if (match.status === 'pending' && 
                        (match.player1.walletAddress.toLowerCase() === currentUser.walletAddress.toLowerCase() || 
                         match.player2.walletAddress.toLowerCase() === currentUser.walletAddress.toLowerCase())) {
                        return match;
                    }
                }
            }
            return null;
        }

        // Load match state
        async function loadMatchState(matchId) {
    try {
        currentMatchId = matchId; // ⭐ Setze Match ID
        const response = await fetch(`https://msi-tournament-backend.onrender.com/games/chess/matches/${matchId}/state`);
        
        if (response.ok) {
            const data = await response.json();
            data.matchId = matchId; // ⭐ Füge Match ID zu data hinzu
            updateGameDisplay(data);
        } else {
            throw new Error('Failed to load match state');
        }
    } catch (error) {
        console.error('Error loading match state:', error);
        showMessage('Fehler beim Laden des Spielstands.', 'error');
    }
}

        // Update game display
        function updateGameDisplay(data) {
            gameState = data.gameState;
            currentMatchId = data.matchId || currentMatchId
            
            // Update player info
            const isPlayer1 = data.player1.walletAddress.toLowerCase() === currentUser.walletAddress.toLowerCase();
            const myPlayer = isPlayer1 ? data.player1 : data.player2;
            const opponent = isPlayer1 ? data.player2 : data.player1;
            const myColor = isPlayer1 ? 'white' : 'black';
            const boardElement = document.getElementById('chessBoard');

            document.getElementById('whitePlayer').querySelector('.player-name').textContent = 
                data.player1.platformUsername || data.player1.username;
            document.getElementById('blackPlayer').querySelector('.player-name').textContent = 
                data.player2.platformUsername || data.player2.username;

            // Highlight current player
            if (data.status === 'pending') {
                const isMyTurn = gameState.currentPlayer === (isPlayer1 ? 'white' : 'black');
                
                document.getElementById('whitePlayer').classList.toggle('active', gameState.currentPlayer === 'white');
                document.getElementById('blackPlayer').classList.toggle('active', gameState.currentPlayer === 'black');
                
                // Highlight current user
                if (isPlayer1) {
                    document.getElementById('whitePlayer').classList.add('current-user');
                } else {
                    document.getElementById('blackPlayer').classList.add('current-user');
                }

                // Update status
                const statusEl = document.getElementById('gameStatus');
                if (isMyTurn) {
                    statusEl.textContent = '🎯 Du bist am Zug!';
                    statusEl.className = 'game-status my-turn';
                } else {
                    statusEl.textContent = '⏳ Warte auf Gegner...';
                    statusEl.className = 'game-status waiting';
                }
            } else if (data.status === 'completed') {
                const statusEl = document.getElementById('gameStatus');
                if (data.winner) {
                    const isWinner = data.winner.walletAddress.toLowerCase() === currentUser.walletAddress.toLowerCase();
                    statusEl.textContent = isWinner ? '🎉 Du hast gewonnen!' : '😞 Du hast verloren';
                    statusEl.className = `game-status ${isWinner ? 'winner' : 'finished'}`;
                } else {
                    statusEl.textContent = '🤝 Unentschieden';
                    statusEl.className = 'game-status finished';
                }
            }

            // Update board
            updateBoard();
            
            boardFlipped = (myColor === 'black');
            boardElement.style.transform = boardFlipped ? 'rotate(180deg)' : 'none';

            // Auch die Figuren richtig herum drehen
            document.querySelectorAll('.chess-square img').forEach(img => {
                img.style.transform = boardFlipped ? 'rotate(180deg)' : 'none';
            });
            
            // Update move history
            updateMoveHistory();
        }

        // Update chess board
function updateBoard() {
    const board = document.getElementById('chessBoard');
    
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const square = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            if (!square) continue;
            
            const piece = gameState.board[row][col];
            
            if (piece) {
                const color = piece.color === 'w' ? 'white' : 'black';
                const imgSrc = chessPieces[color][piece.type];
                
                // Check if already has correct image
                const existingImg = square.querySelector('img');
                if (existingImg && existingImg.src.endsWith(imgSrc)) {
                    continue; // No update needed
                }
                
                // Create/update image
                square.innerHTML = '';
                const img = document.createElement('img');
                img.src = imgSrc;
                img.alt = piece.type;
                img.onerror = function() {
                    // Fallback to Unicode on error
                    this.style.display = 'none';
                    square.textContent = chessPiecesFallback[color][piece.type];
                };
                square.appendChild(img);
            } else {
                square.innerHTML = '';
            }
        }
    }
}

function isKingInCheck(board, color) {
    // Find king position
    let kingRow, kingCol;
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const piece = board[row][col];
            if (piece && piece.type === 'king' && piece.color === color) {
                kingRow = row;
                kingCol = col;
                break;
            }
        }
        if (kingRow !== undefined) break;
    }
    
    if (kingRow === undefined) return true;
    
    const opponentColor = color === 'w' ? 'b' : 'w';
    
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const piece = board[row][col];
            if (piece && piece.color === opponentColor) {
                if (isValidPieceMoveSimple(piece, row, col, kingRow, kingCol)) {
                    // Springer ignoriert Blockierung
                    if (piece.type === 'knight') {
                        return true;
                    }
                    
                    // Prüfe ob Weg blockiert ist
                    const rowDiff = Math.abs(kingRow - row);
                    const colDiff = Math.abs(kingCol - col);
                    const isDiagonal = rowDiff === colDiff;
                    
                    if (isDiagonal) {
                        if (!isPathBlockedDiagonal(row, col, kingRow, kingCol)) {
                            return true;
                        }
                    } else {
                        if (!isPathBlockedStraight(row, col, kingRow, kingCol)) {
                            return true;
                        }
                    }
                }
            }
        }
    }
    
    return false;
}

function isValidPieceMoveSimple(piece, fromRow, fromCol, toRow, toCol) {
    const rowDiff = Math.abs(toRow - fromRow);
    const colDiff = Math.abs(toCol - fromCol);
    
    switch (piece.type) {
        case 'pawn':
            const direction = piece.color === 'w' ? -1 : 1;
            return Math.abs(toCol - fromCol) === 1 && (toRow - fromRow) === direction;
        case 'knight':
            return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
        case 'bishop':
            return rowDiff === colDiff && rowDiff > 0;
        case 'rook':
            return (rowDiff > 0 && colDiff === 0) || (rowDiff === 0 && colDiff > 0);
        case 'queen':
            return (rowDiff === colDiff && rowDiff > 0) || 
                   (rowDiff > 0 && colDiff === 0) || 
                   (rowDiff === 0 && colDiff > 0);
        case 'king':
            return rowDiff <= 1 && colDiff <= 1;
        default:
            return false;
    }
}

        // Handle square click
   async function handleSquareClick(row, col) {
    if (boardFlipped) {
        row = 7 - row;
        col = 7 - col;
    }

    if (!gameState || gameState.status === 'completed') return;
    
    const isPlayer1 = currentUser.walletAddress.toLowerCase() === gameState.players.white.walletAddress.toLowerCase();
    const myColor = isPlayer1 ? 'white' : 'black';
    
    if (gameState.currentPlayer !== myColor) {
        showMessage('Du bist nicht am Zug!', 'error');
        return;
    }

    if (selectedSquare) {
        const [fromRow, fromCol] = selectedSquare;
        
        if (fromRow === row && fromCol === col) {
            selectedSquare = null;
            clearHighlights();
            return;
        }

        try {
            // Stoppe Polling während Move
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
            
            await makeMove(fromRow, fromCol, row, col);
            
            // Starte Polling wieder
            startPolling(currentMatchId);
            
        } catch (error) {
            showMessage(error.message || 'Ungültiger Zug', 'error');
            selectedSquare = null;
            clearHighlights();
            startPolling(currentMatchId);
        }
    } else {
        const piece = gameState.board[row][col];
        if (piece && ((myColor === 'white' && piece.color === 'w') || 
                      (myColor === 'black' && piece.color === 'b'))) {
            selectedSquare = [row, col];
            highlightValidMoves(row, col);
        }
    }
}

function clearHighlights() {
    document.querySelectorAll('.chess-square').forEach(sq => {
        sq.classList.remove('selected'); // 'valid-move' und 'capture' entfernt
    });
}

async function highlightValidMoves(row, col) {
    clearHighlights();
    const square = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
    if (square) square.classList.add('selected');
    
    // Keine weiteren Highlights für mögliche Züge
}

function isValidMoveForPiece(piece, fromRow, fromCol, toRow, toCol, targetPiece) {
    const rowDiff = Math.abs(toRow - fromRow);
    const colDiff = Math.abs(toCol - fromCol);
    const rowDir = toRow - fromRow;
    const colDir = toCol - fromCol;
    
    // Can't capture own piece
    if (targetPiece && targetPiece.color === piece.color) return false;
    
    switch (piece.type) {
        case 'pawn':
    const direction = piece.color === 'w' ? -1 : 1;
    const startRow = piece.color === 'w' ? 6 : 1;
    
    // Forward move (nur wenn kein Ziel)
    if (colDir === 0 && rowDir === direction && !targetPiece) {
        return true;
    }
    
    // Initial two squares (Weg muss frei sein)
    if (colDir === 0 && rowDir === 2 * direction && fromRow === startRow && !targetPiece) {
        const middleRow = fromRow + direction;
        if (!gameState.board[middleRow][fromCol]) {
            return true;
        }
    }
    
    // Diagonal capture (NUR wenn gegnerische Figur da ist)
    if (Math.abs(colDir) === 1 && rowDir === direction && targetPiece && targetPiece.color !== piece.color) {
        return true;
    }
    
    // En Passant
    if (Math.abs(colDir) === 1 && rowDir === direction && !targetPiece) {
        if (gameState.enPassantTarget && 
            toRow === gameState.enPassantTarget[0] && 
            toCol === gameState.enPassantTarget[1]) {
            return true;
        }
    }
    
    return false;
            
        case 'knight':
            // Springer ignoriert Blockierung
            return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
            
        case 'bishop':
            if (rowDiff === colDiff && rowDiff > 0) {
                return !isPathBlockedDiagonal(fromRow, fromCol, toRow, toCol);
            }
            return false;
            
        case 'rook':
            if ((rowDiff > 0 && colDiff === 0) || (rowDiff === 0 && colDiff > 0)) {
                return !isPathBlockedStraight(fromRow, fromCol, toRow, toCol);
            }
            return false;
            
        case 'queen':
            const isDiagonal = rowDiff === colDiff && rowDiff > 0;
            const isStraight = (rowDiff > 0 && colDiff === 0) || (rowDiff === 0 && colDiff > 0);
            
            if (isDiagonal) {
                return !isPathBlockedDiagonal(fromRow, fromCol, toRow, toCol);
            }
            if (isStraight) {
                return !isPathBlockedStraight(fromRow, fromCol, toRow, toCol);
            }
            return false;
            
        case 'king':
    // Normal king move (nur 1 Feld in alle Richtungen)
    if (rowDiff <= 1 && colDiff <= 1 && (rowDiff > 0 || colDiff > 0)) {
        return true;
    }
    
    // Castling (separate Validierung, nur wenn genau 2 Felder horizontal)
    if (rowDiff === 0 && colDiff === 2) {
        const colorPrefix = piece.color === 'w' ? 'white' : 'black';
        const isKingside = toCol > fromCol;
        const rookCol = isKingside ? 7 : 0;
        
        // 1. Check castling rights
        if (isKingside && !gameState.castlingRights[colorPrefix].kingside) return false;
        if (!isKingside && !gameState.castlingRights[colorPrefix].queenside) return false;
        
        // 2. Prüfe ob Turm noch da ist
        const rook = gameState.board[fromRow][rookCol];
        if (!rook || rook.type !== 'rook' || rook.color !== piece.color) return false;
        
        // 3. Check if king is in check
        if (isKingInCheck(gameState.board, piece.color)) return false;
        
        // 4. Check if path is clear
        const direction = isKingside ? 1 : -1;
        const steps = 2; // Beide Seiten: nur 2 Felder prüfen

        for (let i = 1; i <= steps; i++) {
            const checkCol = fromCol + (i * direction);
            if (gameState.board[fromRow][checkCol]) return false; // Path must be clear
        }
        
        // 5. King cannot pass through or land on attacked square (only first 2 squares)
        for (let i = 1; i <= 2; i++) {
            const checkCol = fromCol + (i * direction);
            const testBoard = JSON.parse(JSON.stringify(gameState.board));
            testBoard[fromRow][checkCol] = piece;
            testBoard[fromRow][fromCol] = null;
            if (isKingInCheck(testBoard, piece.color)) return false;
        }
        
        return true;
    }
    
    return false;
            
        default:
            return false;
    }
}

function isPathBlockedStraight(fromRow, fromCol, toRow, toCol) {
    const rowStep = toRow > fromRow ? 1 : (toRow < fromRow ? -1 : 0);
    const colStep = toCol > fromCol ? 1 : (toCol < fromCol ? -1 : 0);
    
    let currentRow = fromRow + rowStep;
    let currentCol = fromCol + colStep;
    
    while (currentRow !== toRow || currentCol !== toCol) {
        if (gameState.board[currentRow][currentCol]) {
            return true; // Blockiert
        }
        currentRow += rowStep;
        currentCol += colStep;
    }
    return false;
}

// Hilfsfunktion für diagonale Linien (Läufer/Dame)
function isPathBlockedDiagonal(fromRow, fromCol, toRow, toCol) {
    const rowStep = toRow > fromRow ? 1 : -1;
    const colStep = toCol > fromCol ? 1 : -1;
    
    let currentRow = fromRow + rowStep;
    let currentCol = fromCol + colStep;
    
    while (currentRow !== toRow || currentCol !== toCol) {
        if (gameState.board[currentRow][currentCol]) {
            return true; // Blockiert
        }
        currentRow += rowStep;
        currentCol += colStep;
    }
    return false;
}

async function makeMove(fromRow, fromCol, toRow, toCol) {
    if (!currentMatchId) {
        throw new Error('Keine Match-ID gefunden');
    }

    const piece = gameState.board[fromRow][fromCol];
    const testBoard = JSON.parse(JSON.stringify(gameState.board));
    
    // Simuliere den Zug
    testBoard[toRow][toCol] = piece;
    testBoard[fromRow][fromCol] = null;
    
    // Handle En Passant capture in simulation
    if (piece.type === 'pawn' && toCol !== fromCol && !gameState.board[toRow][toCol]) {
        const capturedPawnRow = fromRow;
        testBoard[capturedPawnRow][toCol] = null;
    }
    
    // Handle castling rook move in simulation
    if (piece.type === 'king' && Math.abs(toCol - fromCol) === 2) {
        const isKingside = toCol > fromCol;
        const rookFromCol = isKingside ? 7 : 0;
        const rookToCol = isKingside ? toCol - 1 : toCol + 1;
        const rook = testBoard[fromRow][rookFromCol];
        testBoard[fromRow][rookToCol] = rook;
        testBoard[fromRow][rookFromCol] = null;
    }
    
    const isPlayer1 = currentUser.walletAddress.toLowerCase() === gameState.players.white.walletAddress.toLowerCase();
    const myColor = isPlayer1 ? 'white' : 'black';
    const colorCode = myColor === 'white' ? 'w' : 'b';
    
    // NEU: Prüfe BEIDE Situationen
    const wasInCheck = isKingInCheck(gameState.board, colorCode);
    const stillInCheck = isKingInCheck(testBoard, colorCode);
    
    if (stillInCheck) {
        if (wasInCheck) {
            throw new Error('Dieser Zug lässt das CS:GO2 Situation nicht auf!');
        } else {
            throw new Error('Dieser Zug würde deinen König in eine gefährliche Position bringen!');
        }
    }
    
    const response = await fetch(`https://msi-tournament-backend.onrender.com/games/chess/matches/${currentMatchId}/move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            from: [fromRow, fromCol],
            to: [toRow, toCol],
            walletAddress: currentUser.walletAddress,
            promotion: shouldPromote(fromRow, fromCol, toRow) ? 'queen' : null
        })
    });

    if (!response.ok) {
        const error = await response.json();
        throw new Error(error.error);
    }

    const data = await response.json();
    updateGameDisplay({ 
        gameState: data.gameState, 
        status: data.status, 
        winner: data.winner,
        player1: gameState.players.white,
        player2: gameState.players.black
    });
    selectedSquare = null;
    clearHighlights();
}

function shouldPromote(fromRow, fromCol, toRow) {
    const piece = gameState.board[fromRow][fromCol];
    return piece?.type === 'pawn' && (toRow === 0 || toRow === 7);
}

function updateMoveHistory() {
}

let pollingTimeout = null;

function startPolling(matchId) {
    currentMatchId = matchId;
    
    if (pollingInterval) clearInterval(pollingInterval);
    
    let lastStateHash = null;
    
    const poll = async () => {
        if (!currentMatchId) return;
        
        try {
            const response = await fetch(`https://msi-tournament-backend.onrender.com/games/chess/matches/${currentMatchId}/state`);
            if (response.ok) {
                const data = await response.json();
                
                // Simple Hash um unnötige Updates zu vermeiden
                const stateHash = JSON.stringify({
                    moves: data.gameState.moves.length,
                    status: data.status,
                    currentPlayer: data.gameState.currentPlayer
                });
                
                if (stateHash !== lastStateHash) {
                    updateGameDisplay(data);
                    lastStateHash = stateHash;
                }
            }
        } catch (error) {
            console.warn('Polling error:', error);
        }
    };
    
    poll(); // Sofort einmal ausführen
    pollingInterval = setInterval(poll, 4000); // 3000 → 4000
}

// Check connection on load
async function checkConnection() {
    if (isMetaMaskInstalled()) {
        try {
            const accounts = await window.ethereum.request({
                method: 'eth_accounts'
            });
            
            if (accounts.length > 0) {
                const walletAddress = accounts[0];
                const response = await fetch(`https://msi-tournament-backend.onrender.com/user/${walletAddress}`);
                
                if (response.ok) {
                    currentUser = await response.json();
                    updateConnectedUI();
                    await loadChessGame();
                }
            }
        } catch (error) {
            console.error('Error checking connection:', error);
        }
    }
}

function initializeBoard() {
    const board = document.getElementById('chessBoard');
    board.innerHTML = ''; // Clear existing
    
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const square = document.createElement('div');
            square.className = `chess-square ${(row + col) % 2 === 0 ? 'white' : 'black'}`;
            square.dataset.row = row;
            square.dataset.col = col;

            // ⬇️ Diese Zeile ändern:
            square.onclick = () => {
                if (boardFlipped) {
                    handleSquareClick(7 - row, 7 - col);
                } else {
                    handleSquareClick(row, col);
                }
};

            board.appendChild(square);
        }
    }
}

// Initialize
window.addEventListener('load', () => {
    initializeBoard();
    checkConnection();
});

// Add this variable at the top with other globals

let boardFlipped = false;
